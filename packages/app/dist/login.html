<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/styles/reset.css"/>
  <link rel="stylesheet" href="/styles/tokens.css"/>
  <link rel="stylesheet" href="/styles/page.css"/>
  <script type="module" crossorigin src="/assets/login-CgHOf_UF.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/view-ClXcsvmU.js">

<body class="page">
  <auth-provider>
    <h2>User Login</h2>
    <main class="card">
      <login-form api="/auth/login">
        <label>
          <span>Username:</span>
          <input name="username" autocomplete="off" />
        </label>
        <label>
          <span>Password:</span>
          <input type="password" name="password" />
        </label>
      </login-form>
    </main>
    <p>Or did you want to <a href="/register.html">Register as a new user</a>?</p>
  </auth-provider>
</body>
</html>
