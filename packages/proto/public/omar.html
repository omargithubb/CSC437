<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="/styles/reset.css"/>
  <link rel="stylesheet" href="/styles/tokens.css"/>
  <link rel="stylesheet" href="/styles/page.css"/>

</head>

<body>
    <!-- 
        HEADER
    -->
  <header class="app-header">
  <div class="logo">Activity Tracker</div>

  <div class="welcome">Profile</div>

  <div class="header-controls">

    <label class="dark-toggle">
      <input
        type="checkbox"
        autocomplete="off"
      />
      Dark Mode
    </label>

    <div class="user">Omar</div>

  </div>
</header>

  <main class="page">

    <a class="back-link" href="index.html">
        <svg class="icon">
            <use href="/icons/running.svg#icon-back" />
        </svg>
        Back to Home
    </a>

    <section class="profile">

      <div class="card profile-card">
        <h2>Omar Gonzalez</h2>
      </div>

      <div class="card profile-card">
        <span>Age</span>
        <span>22</span>
      </div>

      <div class="card profile-card">
        <span>Height</span>
        <span>6'0"</span>
      </div>

      <div class="card profile-card">
        <span>Fastest Mile</span>
        <span>9 min 52 sec</span>
      </div>

    </section>

  </main>

    <script type="module" src="/scripts/darkmode.js"></script>


</body>
</html>
