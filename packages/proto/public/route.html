<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="/styles/reset.css"/>
  <link rel="stylesheet" href="/styles/tokens.css"/>
  <link rel="stylesheet" href="/styles/page.css"/>

  <script type="importmap">
    {
      "imports": {
        "@unbndl/auth": "https://unpkg.com/@unbndl/auth",
        "@unbndl/html": "https://unpkg.com/@unbndl/html",
        "@unbndl/view": "https://unpkg.com/@unbndl/view"
      }
    }
  </script>

  <script type="module">
    import { define } from "@unbndl/html";
    import { Auth } from "@unbndl/auth";
    import { HeaderElement } from "/js/header.js";
    import { RunRouteElement } from "/src/run-route.js";
    import { RouteListElement } from "/src/route-list.js";

    define({
      "auth-provider": Auth.Provider,
      "app-header": HeaderElement,
      "run-route": RunRouteElement,
      "route-list": RouteListElement
    });
  </script>
</head>

<body>
  <auth-provider>

    <app-header></app-header>

    <main class="page">

      <a class="back-link" href="index.html">
        <svg class="icon">
          <use href="/icons/running.svg#icon-back" />
        </svg>
        Back to Home
      </a>

      <route-list src="/api/routes"></route-list>

    </main>

    <script type="module" src="/scripts/darkmode.js"></script>
  </auth-provider>
</body>

</html>
